<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      width: 380px;
      min-height: 500px;
      background: #131315;
      color: #e5e1e4;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      padding: 20px;
    }
    
    .header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
      padding-bottom: 16px;
      border-bottom: 1px solid rgba(80, 238, 222, 0.2);
    }
    
    .logo {
      width: 40px;
      height: 40px;
      background: linear-gradient(135deg, #50eede, #1fd1c2);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
    }
    
    .title {
      font-size: 16px;
      font-weight: 600;
      color: #50eede;
    }
    
    .subtitle {
      font-size: 11px;
      color: #859491;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    
    .status-bar {
      background: #1c1b1d;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    
    .status-indicator {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #859491;
    }
    
    .status-indicator.active {
      background: #50eede;
      box-shadow: 0 0 10px rgba(80, 238, 222, 0.5);
    }
    
    .status-indicator.recording {
      background: #ff6b6b;
      animation: pulse 1.5s infinite;
    }
    
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.7; transform: scale(1.2); }
    }
    
    .status-text {
      font-size: 13px;
      flex: 1;
    }
    
    .btn {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    
    .btn-primary {
      background: linear-gradient(135deg, #50eede, #1fd1c2);
      color: #131315;
    }
    
    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 20px rgba(80, 238, 222, 0.4);
    }
    
    .btn-stop {
      background: linear-gradient(135deg, #ff6b6b, #ee5a5a);
      color: white;
    }
    
    .btn-stop:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 20px rgba(255, 107, 107, 0.4);
    }
    
    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }
    
    .results {
      background: #1c1b1d;
      border-radius: 12px;
      padding: 16px;
      margin-top: 16px;
      max-height: 250px;
      overflow-y: auto;
    }
    
    .results-header {
      font-size: 12px;
      font-weight: 600;
      color: #50eede;
      margin-bottom: 12px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    
    .result-item {
      margin-bottom: 12px;
      padding-bottom: 12px;
      border-bottom: 1px solid rgba(133, 148, 145, 0.1);
    }
    
    .result-item:last-child {
      border-bottom: none;
      margin-bottom: 0;
      padding-bottom: 0;
    }
    
    .result-label {
      font-size: 11px;
      color: #859491;
      margin-bottom: 4px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    
    .result-value {
      font-size: 14px;
      color: #e5e1e4;
      line-height: 1.5;
    }
    
    .score-badge {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
    }
    
    .score-hot {
      background: rgba(255, 107, 107, 0.2);
      color: #ff6b6b;
    }
    
    .score-warm {
      background: rgba(255, 193, 7, 0.2);
      color: #ffc107;
    }
    
    .score-cold {
      background: rgba(80, 238, 222, 0.2);
      color: #50eede;
    }
    
    .transcript-preview {
      background: #0e0e10;
      border-radius: 8px;
      padding: 12px;
      margin-top: 12px;
      font-size: 12px;
      color: #bacac6;
      max-height: 100px;
      overflow-y: auto;
      white-space: pre-wrap;
      line-height: 1.6;
    }
    
    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      color: #50eede;
    }
    
    .spinner {
      width: 20px;
      height: 20px;
      border: 2px solid transparent;
      border-top-color: #50eede;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-right: 10px;
    }
    
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    
    .error {
      background: rgba(255, 107, 107, 0.1);
      border: 1px solid rgba(255, 107, 107, 0.3);
      border-radius: 8px;
      padding: 12px;
      color: #ff6b6b;
      font-size: 12px;
      margin-top: 12px;
    }
    
    .instructions {
      font-size: 11px;
      color: #859491;
      margin-top: 16px;
      line-height: 1.6;
    }
    
    .instructions strong {
      color: #50eede;
    }
    
    .timer {
      font-size: 24px;
      font-weight: 700;
      color: #50eede;
      text-align: center;
      margin: 10px 0;
      font-variant-numeric: tabular-nums;
    }
    
    .timer.recording {
      color: #ff6b6b;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">⚡</div>
    <div>
      <div class="title">NextStep AI</div>
      <div class="subtitle">Call Analyzer</div>
    </div>
  </div>
  
  <div class="status-bar">
    <div class="status-indicator" id="statusIndicator"></div>
    <span class="status-text" id="statusText">Ready to analyze</span>
  </div>
  
  <div class="timer" id="timer">00:00</div>
  
  <button class="btn btn-primary" id="startBtn" onclick="startCapture()">
    <span>🎙️</span> Start Capture
  </button>
  
  <button class="btn btn-stop" id="stopBtn" onclick="stopCapture()" style="display: none;">
    <span>⏹️</span> Stop & Analyze
  </button>
  
  <div id="loadingIndicator" class="loading" style="display: none;">
    <div class="spinner"></div>
    Analyzing...
  </div>
  
  <div id="results" class="results" style="display: none;">
    <div class="results-header">Analysis Results</div>
    <div id="resultsContent"></div>
  </div>
  
  <div id="errorContainer"></div>
  
  <div class="instructions">
    <strong>How to use:</strong><br>
    1. Open Zoom or Google Meet in a tab<br>
    2. Click "Start Capture" to select the meeting tab<br>
    3. Speak and let the call continue<br>
    4. Click "Stop & Analyze" when ready<br>
    5. View AI-generated insights
  </div>

  <script src="popup.js"></script>
</body>
</html>
