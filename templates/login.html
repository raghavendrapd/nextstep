<!DOCTYPE html>
<html class="dark" lang="en">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>Login - NextStep AI</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
  <script>
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            surface: "#131315",
            background: "#131315",
            "surface-container-lowest": "#0e0e10",
            "surface-container-low": "#1c1b1d",
            "surface-container": "#201f21",
            "surface-container-high": "#2a2a2c",
            "surface-container-highest": "#353437",
            "surface-variant": "#353437",
            primary: "#50eede",
            "primary-container": "#1fd1c2",
            secondary: "#c6bfff",
            "secondary-container": "#4029ba",
            tertiary: "#ffc8da",
            "tertiary-container": "#ff9ec3",
            error: "#ffb4ab",
            "on-surface": "#e5e1e4",
            "on-surface-variant": "#bacac6",
            outline: "#859491",
            "outline-variant": "#3b4a47",
          },
          fontFamily: {
            headline: ["Space Grotesk"],
            body: ["Inter"],
          },
        },
      },
    }
  </script>
  <style>
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }
    .glass-panel {
      backdrop-filter: blur(12px);
      background: rgba(32, 31, 33, 0.6);
    }
    .neon-glow {
      box-shadow: 0 0 20px rgba(80, 238, 222, 0.3);
    }
    .neon-glow-sm {
      box-shadow: 0 0 10px rgba(80, 238, 222, 0.2);
    }
    input:-webkit-autofill {
      -webkit-box-shadow: 0 0 0 1000px #201f21 inset;
      -webkit-text-fill-color: #e5e1e4;
    }
  </style>
</head>
<body class="bg-surface text-on-surface font-body min-h-screen flex items-center justify-center relative overflow-hidden">

  <!-- Background Decorations -->
  <div class="absolute top-[-20%] right-[-15%] w-[700px] h-[700px] bg-primary/10 rounded-full blur-[150px] pointer-events-none"></div>
  <div class="absolute bottom-[-20%] left-[-15%] w-[500px] h-[500px] bg-secondary/8 rounded-full blur-[120px] pointer-events-none"></div>

  <!-- Login Card -->
  <div class="relative z-10 w-full max-w-md px-6">
    <div class="glass-panel rounded-[2rem] border border-outline-variant/20 p-10 neon-glow">
      <!-- Logo -->
      <div class="flex items-center gap-3 justify-center mb-10">
        <div class="w-12 h-12 rounded-xl bg-gradient-to-br from-primary to-primary-container flex items-center justify-center">
          <span class="material-symbols-outlined text-on-surface text-2xl" style="font-variation-settings: 'FILL' 1;">bolt</span>
        </div>
        <div>
          <h1 class="font-headline font-bold text-primary text-2xl leading-none">NextStep AI</h1>
          <p class="text-[10px] text-gray-500 tracking-widest uppercase mt-1">Sales Intelligence</p>
        </div>
      </div>

      <!-- Title -->
      <div class="text-center mb-8">
        <h2 class="text-2xl font-headline font-bold text-white mb-2" id="formTitle">Welcome Back</h2>
        <p class="text-on-surface-variant text-sm" id="formSubtitle">Sign in to access your sales copilot</p>
      </div>

      <!-- Login Form -->
      <form id="loginForm" class="space-y-5">
        <div>
          <label class="block text-sm font-medium text-on-surface-variant mb-2">Username</label>
          <div class="relative">
            <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline">person</span>
            <input type="text" id="username" required
              class="w-full pl-12 pr-4 py-3.5 bg-surface-container rounded-xl border border-outline-variant/30 text-white placeholder:text-outline focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary/50 transition-all"
              placeholder="Enter username"/>
          </div>
        </div>

        <div>
          <label class="block text-sm font-medium text-on-surface-variant mb-2">Password</label>
          <div class="relative">
            <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline">lock</span>
            <input type="password" id="password" required
              class="w-full pl-12 pr-12 py-3.5 bg-surface-container rounded-xl border border-outline-variant/30 text-white placeholder:text-outline focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary/50 transition-all"
              placeholder="Enter password"/>
            <button type="button" onclick="togglePassword()" class="absolute right-4 top-1/2 -translate-y-1/2 text-outline hover:text-on-surface transition-colors">
              <span class="material-symbols-outlined text-xl" id="eyeIcon">visibility</span>
            </button>
          </div>
        </div>

        <div id="displayNameGroup" class="hidden">
          <label class="block text-sm font-medium text-on-surface-variant mb-2">Display Name</label>
          <div class="relative">
            <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline">badge</span>
            <input type="text" id="displayName"
              class="w-full pl-12 pr-4 py-3.5 bg-surface-container rounded-xl border border-outline-variant/30 text-white placeholder:text-outline focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary/50 transition-all"
              placeholder="How should we call you?"/>
          </div>
        </div>

        <div id="errorMsg" class="hidden text-error text-sm text-center py-2 bg-error/10 rounded-lg"></div>

        <button type="submit" id="submitBtn"
          class="w-full py-3.5 bg-gradient-to-r from-primary to-primary-container text-surface font-semibold rounded-xl hover:opacity-90 transition-all duration-300 flex items-center justify-center gap-2 neon-glow-sm">
          <span class="material-symbols-outlined" id="submitIcon" style="font-variation-settings: 'FILL' 1;">login</span>
          <span id="submitText">Sign In</span>
        </button>
      </form>

      <!-- Toggle -->
      <div class="mt-6 text-center">
        <button onclick="toggleMode()" class="text-sm text-on-surface-variant hover:text-primary transition-colors">
          <span id="toggleText">Don't have an account?</span>
          <span id="toggleLink" class="text-primary font-medium"> Sign up</span>
        </button>
      </div>

      <!-- Demo hint -->
      <div class="mt-6 p-4 rounded-xl bg-surface-container-high/50 border border-outline-variant/20">
        <p class="text-xs text-center text-on-surface-variant">
          <span class="text-primary font-medium">Demo:</span> username <code class="bg-surface-container px-1.5 py-0.5 rounded text-white">demo</code> password <code class="bg-surface-container px-1.5 py-0.5 rounded text-white">demo123</code>
        </p>
      </div>
    </div>
  </div>

  <script>
    let isRegister = false;

    function togglePassword() {
      const input = document.getElementById('password');
      const icon = document.getElementById('eyeIcon');
      if (input.type === 'password') {
        input.type = 'text';
        icon.textContent = 'visibility_off';
      } else {
        input.type = 'password';
        icon.textContent = 'visibility';
      }
    }

    function toggleMode() {
      isRegister = !isRegister;
      const form = document.getElementById('loginForm');
      const title = document.getElementById('formTitle');
      const subtitle = document.getElementById('formSubtitle');
      const toggleText = document.getElementById('toggleText');
      const toggleLink = document.getElementById('toggleLink');
      const submitBtn = document.getElementById('submitBtn');
      const submitText = document.getElementById('submitText');
      const submitIcon = document.getElementById('submitIcon');
      const displayGroup = document.getElementById('displayNameGroup');
      const errorMsg = document.getElementById('errorMsg');
      
      errorMsg.classList.add('hidden');
      
      if (isRegister) {
        title.textContent = 'Create Account';
        subtitle.textContent = 'Join NextStep AI today';
        toggleText.textContent = 'Already have an account?';
        toggleLink.textContent = ' Sign in';
        submitText.textContent = 'Create Account';
        submitIcon.textContent = 'how_to_reg';
        displayGroup.classList.remove('hidden');
      } else {
        title.textContent = 'Welcome Back';
        subtitle.textContent = 'Sign in to access your sales copilot';
        toggleText.textContent = "Don't have an account?";
        toggleLink.textContent = ' Sign up';
        submitText.textContent = 'Sign In';
        submitIcon.textContent = 'login';
        displayGroup.classList.add('hidden');
      }
    }

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const errorMsg = document.getElementById('errorMsg');
      errorMsg.classList.add('hidden');

      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      const displayName = document.getElementById('displayName').value.trim();

      const endpoint = isRegister ? '/register' : '/login';
      const body = isRegister 
        ? { username, password, display_name: displayName || username }
        : { username, password };

      try {
        const res = await fetch(endpoint, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body)
        });

        const data = await res.json();

        if (res.ok) {
          window.location.href = '/';
        } else {
          errorMsg.textContent = data.detail || 'Authentication failed';
          errorMsg.classList.remove('hidden');
        }
      } catch (err) {
        errorMsg.textContent = 'Connection error. Please try again.';
        errorMsg.classList.remove('hidden');
      }
    });

    // Check if already logged in
    (async () => {
      try {
        const res = await fetch('/me');
        const data = await res.json();
        if (data.authenticated) {
          window.location.href = '/';
        }
      } catch {}
    })();
  </script>
</body>
</html>
